name: nightly-batch

on:
  schedule:
    # 平日 18:30 JST (09:30 UTC) — 大引け後にその日のデータを取得
    - cron: "30 9 * * 1-5"
  workflow_dispatch: # 手動実行も可能

jobs:
  batch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run batch
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python batch.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/screener.csv
          # スイング関連ファイルは処理失敗時に存在しないことがあるため、あるものだけ追加
          for f in data/candidates.csv data/swing_status.json; do
            if [ -f "$f" ]; then git add -f "$f"; fi
          done
          git diff --cached --quiet || git commit -m "銘柄データ更新 $(date +%Y-%m-%d)"
          git push
